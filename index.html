<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulamasi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 7px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f9f9fb;
      border-radius: 8px;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-word;
    }

    li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    li button.delete,
    li button.edit {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    li button.delete { color: #ccc; }
    li button.delete:hover { color: #ef4444; }
    li button.edit { color: #ccc; }
    li button.edit:hover { color: #4f46e5; }

    li .edit-input {
      flex: 1;
      padding: 4px 8px;
      border: 1.5px solid #4f46e5;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
    }

    li button.save {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
    }

    li button.save:hover { background: #4338ca; }

    li button.cancel {
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      color: #888;
      flex-shrink: 0;
    }

    li button.cancel:hover { border-color: #aaa; color: #555; }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #999;
    }

    .footer button {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 13px;
    }

    .footer button:hover { text-decoration: underline; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 24px 0;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      color: #aaa;
      padding: 24px 0;
      font-size: 14px;
    }

    .error-msg {
      background: #fef2f2;
      color: #dc2626;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yapilacaklar</h1>
    <div class="error-msg" id="errorMsg"></div>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Yeni gorev ekle..." />
      <button onclick="addTodo()">Ekle</button>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tumu</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlandi</button>
    </div>
    <ul id="todoList"><li class="loading">Yukleniyor...</li></ul>
    <div class="footer">
      <span id="countLabel"></span>
      <button onclick="clearDone()">Tamamlananları temizle</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://txdvoaqojhfycpylsihg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4ZHZvYXFvamhmeWNweWxzaWhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkxMTQsImV4cCI6MjA5MjI4NTExNH0.OekCTIgoxbqYGSSKfbC49tKcqr0W0GuA8fvgaAre36Y';
    const API = `${SUPABASE_URL}/rest/v1/todos`;
    const HEADERS = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=representation'
    };

    let todos = [];
    let filter = 'all';
    let editingId = null;

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, { ...options, headers: { ...HEADERS, ...options.headers } });
      if (!res.ok) {
        const err = await res.text();
        throw new Error(err);
      }
      const text = await res.text();
      return text ? JSON.parse(text) : [];
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    async function loadTodos() {
      try {
        todos = await apiFetch(`${API}?order=created_at.asc`);
        render();
      } catch (e) {
        showError('Gorevler yuklenemedi: ' + e.message);
      }
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      try {
        const [created] = await apiFetch(API, {
          method: 'POST',
          body: JSON.stringify({ text, done: false })
        });
        todos.push(created);
        render();
      } catch (e) {
        showError('Gorev eklenemedi: ' + e.message);
      }
    }

    async function toggle(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;
      const newDone = !todo.done;
      try {
        const [updated] = await apiFetch(`${API}?id=eq.${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ done: newDone })
        });
        todo.done = updated.done;
        render();
      } catch (e) {
        showError('Guncellenemedi: ' + e.message);
      }
    }

    async function remove(id) {
      try {
        await apiFetch(`${API}?id=eq.${id}`, { method: 'DELETE', headers: { 'Prefer': '' } });
        todos = todos.filter(t => t.id !== id);
        render();
      } catch (e) {
        showError('Silinemedi: ' + e.message);
      }
    }

    async function clearDone() {
      const doneIds = todos.filter(t => t.done).map(t => t.id);
      if (!doneIds.length) return;
      try {
        await apiFetch(`${API}?done=eq.true`, { method: 'DELETE', headers: { 'Prefer': '' } });
        todos = todos.filter(t => !t.done);
        render();
      } catch (e) {
        showError('Temizlenemedi: ' + e.message);
      }
    }

    function startEdit(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo || todo.done) return;
      editingId = id;
      render();
    }

    async function saveEdit(id) {
      const inp = document.getElementById(`edit-${id}`);
      const text = inp ? inp.value.trim() : '';
      if (!text) return;
      try {
        const [updated] = await apiFetch(`${API}?id=eq.${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ text })
        });
        const todo = todos.find(t => t.id === id);
        if (todo) todo.text = updated.text;
        editingId = null;
        render();
      } catch (e) {
        showError('Duzenlenemedi: ' + e.message);
      }
    }

    function cancelEdit() {
      editingId = null;
      render();
    }

    function handleEditKey(e, id) {
      if (e.key === 'Enter') saveEdit(id);
      if (e.key === 'Escape') cancelEdit();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">Gorev yok</li>';
      } else {
        list.innerHTML = filtered.map(t => t.id === editingId ? `
          <li data-id="${t.id}">
            <input class="edit-input" id="edit-${t.id}" value="${escapeHtml(t.text)}"
              onkeydown="handleEditKey(event, ${t.id})" />
            <button class="save" onclick="saveEdit(${t.id})">Kaydet</button>
            <button class="cancel" onclick="cancelEdit()">Iptal</button>
          </li>
        ` : `
          <li class="${t.done ? 'done' : ''}" data-id="${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
            <span ondblclick="startEdit(${t.id})">${escapeHtml(t.text)}</span>
            <button class="edit" onclick="startEdit(${t.id})" title="Duzenle">&#x270E;</button>
            <button class="delete" onclick="remove(${t.id})" title="Sil">&#x2715;</button>
          </li>
        `).join('');

        if (editingId) {
          const inp = document.getElementById(`edit-${editingId}`);
          if (inp) { inp.focus(); inp.select(); }
        }
      }

      const active = todos.filter(t => !t.done).length;
      document.getElementById('countLabel').textContent = `${active} gorev kaldi`;
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    loadTodos();
  </script>
</body>
</html>
