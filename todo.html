<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulamasi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 7px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f9f9fb;
      border-radius: 8px;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-word;
    }

    li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    li button.delete,
    li button.edit {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    li button.delete {
      color: #ccc;
    }

    li button.delete:hover {
      color: #ef4444;
    }

    li button.edit {
      color: #ccc;
    }

    li button.edit:hover {
      color: #4f46e5;
    }

    li .edit-input {
      flex: 1;
      padding: 4px 8px;
      border: 1.5px solid #4f46e5;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
    }

    li button.save {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
    }

    li button.save:hover {
      background: #4338ca;
    }

    li button.cancel {
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      color: #888;
      flex-shrink: 0;
    }

    li button.cancel:hover {
      border-color: #aaa;
      color: #555;
    }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #999;
    }

    .footer button {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 13px;
    }

    .footer button:hover {
      text-decoration: underline;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 24px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yapilacaklar</h1>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Yeni gorev ekle..." />
      <button onclick="addTodo()">Ekle</button>
    </div>
    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tumü</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlandi</button>
    </div>
    <ul id="todoList"></ul>
    <div class="footer">
      <span id="countLabel"></span>
      <button onclick="clearDone()">Tamamlananları temizle</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<li class="empty">Gorev yok</li>';
      } else {
        list.innerHTML = filtered.map(t => t.editing ? `
          <li data-id="${t.id}">
            <input class="edit-input" id="edit-${t.id}" value="${escapeHtml(t.text)}"
              onkeydown="handleEditKey(event, ${t.id})" />
            <button class="save" onclick="saveEdit(${t.id})">Kaydet</button>
            <button class="cancel" onclick="cancelEdit(${t.id})">Iptal</button>
          </li>
        ` : `
          <li class="${t.done ? 'done' : ''}" data-id="${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
            <span ondblclick="startEdit(${t.id})">${escapeHtml(t.text)}</span>
            <button class="edit" onclick="startEdit(${t.id})" title="Duzenle">&#x270E;</button>
            <button class="delete" onclick="remove(${t.id})" title="Sil">&#x2715;</button>
          </li>
        `).join('');

        // Düzenleme modundaysa inputa odaklan
        const editing = filtered.find(t => t.editing);
        if (editing) {
          const inp = document.getElementById(`edit-${editing.id}`);
          if (inp) { inp.focus(); inp.select(); }
        }
      }

      const active = todos.filter(t => !t.done).length;
      document.getElementById('countLabel').textContent =
        `${active} gorev kaldi`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function startEdit(id) {
      todos.forEach(t => t.editing = false);
      const todo = todos.find(t => t.id === id);
      if (todo && !todo.done) todo.editing = true;
      render();
    }

    function saveEdit(id) {
      const inp = document.getElementById(`edit-${id}`);
      const text = inp ? inp.value.trim() : '';
      if (!text) return;
      const todo = todos.find(t => t.id === id);
      if (todo) { todo.text = text; todo.editing = false; }
      save();
      render();
    }

    function cancelEdit(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.editing = false;
      render();
    }

    function handleEditKey(e, id) {
      if (e.key === 'Enter') saveEdit(id);
      if (e.key === 'Escape') cancelEdit(id);
    }

    function toggle(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.done = !todo.done;
      save();
      render();
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
